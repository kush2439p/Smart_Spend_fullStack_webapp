spring.application.name=smartspend

# ============================================================
# DATABASE
# Default: PostgreSQL via PG* environment variables.
# To switch to MySQL: set MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD, DB_DRIVER env vars.
#   MYSQL_URL=jdbc:mysql://host:3306/dbname
#   MYSQL_USER=root
#   MYSQL_PASSWORD=secret
#   DB_DRIVER=com.mysql.cj.jdbc.Driver
# ============================================================
spring.datasource.url=${MYSQL_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:smartspend_db}}
spring.datasource.username=${MYSQL_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:postgres}}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=${HIBERNATE_DIALECT:}

# Connection pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000

# AI – key read from the GOOGLE_API_KEY environment variable
ai.gemini.api-key=${GOOGLE_API_KEY}

# Server
server.port=${PORT:8000}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Scheduling
spring.task.scheduling.pool.size=5

# Public URLs (set APP_DOMAIN to your deployed domain)
app.public-url=https://${APP_DOMAIN:${REPLIT_DEV_DOMAIN:localhost:8080}}
app.frontend-url=https://${APP_DOMAIN:${REPLIT_DEV_DOMAIN:localhost:8080}}
